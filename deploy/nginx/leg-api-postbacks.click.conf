# Nginx site config for leg-api-postbacks.click
# Install: make nginx-install (on Ubuntu server)

upstream postbacks_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name leg-api-postbacks.click;

    # Certbot will add HTTPS redirect after: certbot --nginx -d leg-api-postbacks.click
    location / {
        proxy_pass http://postbacks_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    client_max_body_size 10m;
}
